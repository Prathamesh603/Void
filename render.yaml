services:
  - type: web
    name: void-backend
    runtime: python

    rootDir: backend

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      python main.py

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.14
      - key: API_RELOAD
        value: "false"
      - key: VECTOR_STORE_TYPE
        value: qdrant